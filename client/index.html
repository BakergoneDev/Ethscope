<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ethereum dashboard running on Anvil">
    <meta name="color-scheme" content="light dark">
    <title>Ethscope Dashboard</title>

    <link rel="stylesheet" href="./css/main.css">
  </head>

  <body>
    <a href="#main-content" class="skip-link">Skip to content</a>

    <header class="header">
      <h1 class="logo">Ethscope</h1>
      <button id="theme-toggle" type="button" aria-label="Toggle dark mode">
        🌙
      </button>
    </header>

    <main id="main-content" class="app">
      <div class="grid">

        <section class="card" aria-labelledby="network-heading">
          <h2 id="network-heading">Network info</h2>

          <div class="info-row">
            <span class="info-label">Connection</span>
            <span id="connection-status" class="info-value">-</span>
          </div>

          <div class="info-row">
            <span class="info-label">Network</span>
            <span id="network-id" class="info-value">-</span>
          </div>

          <div class="info-row">
            <span class="info-label">RPC URL</span>
            <span id="rpc-url" class="info-value">-</span>
          </div>

          <div class="info-row">
            <span class="info-label">Latest block</span>
            <span id="latest-block" class="info-value">-</span>
          </div>
        </section>

        <section class="card" aria-labelledby="balance-heading">
          <h2 id="balance-heading">Check balance</h2>

          <label for="balance-input">Account address</label>

          <div class="input-group">
            <input
              id="balance-input"
              list="accounts-list"
              placeholder="Address"
            >
            <button id="clear-balance" type="button">X</button>
          </div>

          <button id="get-balance-btn" type="button">
            Get balance
          </button>

          <p>Balance: <span id="balance-result">-</span></p>
          <p id="balance-error"></p>
        </section>

        <section class="card wide" aria-labelledby="send-heading">
          <h2 id="send-heading">Send transaction</h2>

          <label for="sender-input">Sender</label>
          <div class="input-group">
            <input
              id="sender-input"
              list="accounts-list"
              placeholder="Address"
            >
            <button id="clear-sender" type="button">X</button>
          </div>

          <label for="recipient-input">Recipient</label>
          <div class="input-group">
            <input
              id="recipient-input"
              list="accounts-list"
              placeholder="Address"
            >
            <button id="clear-recipient" type="button">X</button>
          </div>

          <label for="amount">Amount (ETH)</label>
          <input id="amount" type="number">

          <button id="send-btn" type="button">Send</button>

          <p id="send-status"></p>
        </section>

        <section class="card" aria-labelledby="history-heading">
          <h2 id="history-heading">Transaction history</h2>
          <ul id="tx-history"></ul>
          <p id="history-empty" class="empty-state">
            No transactions yet
          </p>
        </section>

        <section class="card wide" aria-labelledby="log-heading">
          <h2 id="log-heading">Status log</h2>
          <ul id="status-log"></ul>
        </section>

      </div>
    </main>

    <datalist id="accounts-list"></datalist>

    <footer>
      <button id="clear-all">Clear data</button>
      <p>Ethscope 2026</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/ethers@6/dist/ethers.umd.min.js" defer></script>
    <script type="module" src="./js/main.js" defer></script>
  </body>
</html>
